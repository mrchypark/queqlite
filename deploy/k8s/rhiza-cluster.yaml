apiVersion: v1
kind: Service
metadata:
  name: __CONFIG_NAME__
  labels:
    app.kubernetes.io/name: rhiza
    app.kubernetes.io/component: peer
    rhiza.dev/execution-profile: "__EXECUTION_PROFILE__"
    rhiza.dev/config-id: "__CONFIG_ID__"
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app.kubernetes.io/name: rhiza
    rhiza.dev/execution-profile: "__EXECUTION_PROFILE__"
    rhiza.dev/config-id: "__CONFIG_ID__"
  ports:
    - name: recorder
      port: 8081
      targetPort: recorder
---
apiVersion: v1
kind: Service
metadata:
  name: __CONFIG_NAME__-client
  labels:
    app.kubernetes.io/name: rhiza
    app.kubernetes.io/component: client
    rhiza.dev/execution-profile: "__EXECUTION_PROFILE__"
    rhiza.dev/config-id: "__CONFIG_ID__"
spec:
  selector:
    app.kubernetes.io/name: rhiza
    rhiza.dev/execution-profile: "__EXECUTION_PROFILE__"
    rhiza.dev/config-id: "__CONFIG_ID__"
  ports:
    - name: client
      port: 8080
      targetPort: client
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: __CONFIG_NAME__
  labels:
    app.kubernetes.io/name: rhiza
    rhiza.dev/execution-profile: "__EXECUTION_PROFILE__"
    rhiza.dev/config-id: "__CONFIG_ID__"
spec:
  serviceName: __CONFIG_NAME__
  replicas: __REPLICAS__
  podManagementPolicy: Parallel
  updateStrategy:
    type: OnDelete
  selector:
    matchLabels:
      app.kubernetes.io/name: rhiza
      rhiza.dev/execution-profile: "__EXECUTION_PROFILE__"
      rhiza.dev/config-id: "__CONFIG_ID__"
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rhiza
        rhiza.dev/execution-profile: "__EXECUTION_PROFILE__"
        rhiza.dev/config-id: "__CONFIG_ID__"
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      terminationGracePeriodSeconds: 30
      containers:
        - name: rhiza
          image: __RHIZA_IMAGE__
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-ec"]
          args:
            - |
              ordinal="${HOSTNAME##*-}"
              case "$ordinal" in ''|*[!0-9]*) exit 64;; esac
              [ "$ordinal" -lt "__REPLICAS__" ] || exit 64
              export RHIZA_NODE_ID="node-$((ordinal + 1))"
              exec rhiza serve
          ports:
            - name: client
              containerPort: 8080
            - name: recorder
              containerPort: 8081
          env:
            - name: RHIZA_EXECUTION_PROFILE
              value: __EXECUTION_PROFILE__
            - name: RHIZA_CLUSTER_ID
              value: __CLUSTER_ID__
            - name: RHIZA_DATA_DIR
              value: /var/lib/rhiza/__EXECUTION_PROFILE__
            - name: RHIZA_EPOCH
              value: "__EPOCH__"
            - name: RHIZA_CONFIG_BUNDLE_FILE
              value: /etc/rhiza/__EXECUTION_PROFILE__/config.json
            - name: RHIZA_OBJECT_STORE
              value: s3
            - name: RHIZA_S3_BUCKET
              value: __S3_BUCKET__
            - name: RHIZA_S3_REGION
              value: __S3_REGION__
            - name: RHIZA_S3_ALLOW_HTTP
              value: "__S3_ALLOW_HTTP__"
            - name: RHIZA_S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: __OBJECT_SECRET__
                  key: access-key
                  optional: true
            - name: RHIZA_S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: __OBJECT_SECRET__
                  key: secret-key
                  optional: true
            - name: RHIZA_RECOVERY_GENERATION
              value: "__RECOVERY_GENERATION__"
            - name: RHIZA_DURABILITY_MODE
              value: __DURABILITY_MODE__
            - name: RHIZA_CHECKPOINT_LEASE_MS
              value: "__CHECKPOINT_LEASE_MS__"
            # __DURABILITY_MAX_LAG_ENV__
            # __DURABILITY_INTERVAL_ENV__
            - name: RHIZA_STARTUP_MODE
              value: __STARTUP_MODE__
            - name: RHIZA_CLIENT_LISTEN
              value: 0.0.0.0:8080
            - name: RHIZA_RECORDER_LISTEN
              value: 0.0.0.0:8081
            - name: RHIZA_CLIENT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: __AUTH_SECRET__
                  key: client-token
            - name: RHIZA_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: __AUTH_SECRET__
                  key: admin-token
          startupProbe:
            httpGet:
              path: /livez
              port: client
            periodSeconds: 2
            failureThreshold: 210
          livenessProbe:
            httpGet:
              path: /livez
              port: client
            periodSeconds: 5
            failureThreshold: 12
          readinessProbe:
            httpGet:
              path: /readyz
              port: client
            periodSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: "__CPU_REQUEST__"
              memory: "__MEMORY_REQUEST__"
            limits:
              cpu: "__CPU_LIMIT__"
              memory: "__MEMORY_LIMIT__"
          volumeMounts:
            - name: data
              mountPath: /var/lib/rhiza
            - name: config
              mountPath: /etc/rhiza/__EXECUTION_PROFILE__
              readOnly: true
      volumes:
        - name: data
          emptyDir:
            sizeLimit: "__DATA_SIZE_LIMIT__"
        - name: config
          secret:
            secretName: __BUNDLE_SECRET__
