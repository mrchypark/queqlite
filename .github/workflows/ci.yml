name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  profile-checks:
    name: Cargo profile (${{ matrix.profile }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile: [sql, graph, kv, all]
    steps:
      - uses: actions/checkout@v4
      - name: Check out Ladybug source for VFS builds
        if: matrix.profile == 'graph' || matrix.profile == 'all'
        uses: actions/checkout@v4
        with:
          repository: mrchypark/ladybug
          ref: f95c0700b841fad79a842b819a7b1721b53569b3
          path: ladybug-source
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Check, lint, and test profile
        env:
          RHIZA_PROFILE: ${{ matrix.profile }}
        run: |
          if [ "$RHIZA_PROFILE" = graph ] || [ "$RHIZA_PROFILE" = all ]; then
            export LBUG_SOURCE_DIR="$GITHUB_WORKSPACE/ladybug-source"
            export LBUG_RUST_BUILD_FROM_SOURCE=1
          fi
          case "$RHIZA_PROFILE" in
            sql|graph|kv) cargo_features=(--no-default-features --features "$RHIZA_PROFILE,recorder-postcard-rpc") ;;
            all) cargo_features=(--all-features) ;;
            *) exit 64 ;;
          esac
          cargo check --locked -p rhiza-cli --all-targets "${cargo_features[@]}"
          if [ "$RHIZA_PROFILE" = graph ]; then
            cargo tree --locked -p rhiza-cli -e features "${cargo_features[@]}" -i lbug \
              | grep -F 'lbug feature "vfs"'
          fi
          if [ "$RHIZA_PROFILE" != all ]; then
            dependency_tree="$RUNNER_TEMP/rhiza-${RHIZA_PROFILE}-dependencies.txt"
            cargo tree --locked -p rhiza-cli -e normal "${cargo_features[@]}" \
              --prefix none --format '{p}' > "$dependency_tree"
            case "$RHIZA_PROFILE" in
              sql) forbidden=(rhiza-graph lbug rhiza-kv redb) ;;
              graph) forbidden=(rhiza-sql rhiza-kv redb) ;;
              kv) forbidden=(rhiza-sql rusqlite libsqlite3-sys rhiza-graph lbug) ;;
            esac
            for dependency in "${forbidden[@]}"; do
              if awk -v package="$dependency" \
                '$1 == package { found=1 } END { exit !found }' "$dependency_tree"; then
                echo "$RHIZA_PROFILE unexpectedly includes $dependency" >&2
                exit 1
              fi
            done
          fi
          cargo clippy --locked -p rhiza-cli --all-targets "${cargo_features[@]}" -- -D warnings
          cargo test --locked -p rhiza-cli --all-targets "${cargo_features[@]}"

  container-images:
    name: Container image (${{ matrix.artifact }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact: rhiza-sql
            profile: sql
          - artifact: rhiza-graph
            profile: graph
          - artifact: rhiza-kv
            profile: kv
          - artifact: rhiza-all
            profile: all
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.artifact }}
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ${{ matrix.artifact }}:ci
          build-args: RHIZA_PROFILE=${{ matrix.profile }}
          cache-from: |
            type=gha,scope=rhiza-sql
            type=gha,scope=rhiza-graph
            type=gha,scope=rhiza-kv
            type=gha,scope=rhiza-all
          cache-to: type=gha,mode=max,scope=rhiza-${{ matrix.profile }}
      - name: Verify image profile and entrypoint
        env:
          RHIZA_IMAGE: ${{ matrix.artifact }}:ci
          RHIZA_PROFILE: ${{ matrix.profile }}
        run: |
          test "$(docker image inspect "$RHIZA_IMAGE" --format '{{ index .Config.Labels "io.rhiza.build-profile" }}')" = "$RHIZA_PROFILE"
          test "$(docker image inspect "$RHIZA_IMAGE" --format '{{ json .Config.Entrypoint }}')" = '["rhiza"]'

  check:
    runs-on: ubuntu-latest
    env:
      LBUG_SOURCE_DIR: ${{ github.workspace }}/ladybug-source
      LBUG_RUST_BUILD_FROM_SOURCE: "1"
    steps:
      - uses: actions/checkout@v4
      - name: Check out Ladybug source for VFS builds
        uses: actions/checkout@v4
        with:
          repository: mrchypark/ladybug
          ref: f95c0700b841fad79a842b819a7b1721b53569b3
          path: ladybug-source
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - run: cargo fmt --all -- --check
      - run: cargo build --release --locked --workspace --all-features --bin rhiza
      - run: cargo clippy --locked --workspace --all-targets --all-features -- -D warnings
      - run: cargo test --locked --workspace --all-targets --all-features
      - run: cargo fmt --manifest-path bench/Cargo.toml -- --check
      - run: cargo clippy --manifest-path bench/Cargo.toml --locked --all-targets -- -D warnings
      - run: cargo test --manifest-path bench/Cargo.toml --locked --all-targets
      - run: bash -n scripts/bench-vind.sh
      - name: Install pinned yq
        env:
          YQ_VERSION: v4.47.2
          YQ_SHA256: 1bb99e1019e23de33c7e6afc23e93dad72aad6cf2cb03c797f068ea79814ddb0
        run: |
          curl -fsSL "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64" -o "${RUNNER_TEMP}/yq"
          echo "${YQ_SHA256}  ${RUNNER_TEMP}/yq" | sha256sum -c -
          sudo install -m 0755 "${RUNNER_TEMP}/yq" /usr/local/bin/yq
      - run: scripts/check-bench-vind-static.sh
      - run: scripts/check-deploy.sh
      - run: scripts/check-quepaxa-package.sh

  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.89
      - run: cargo check -p rhiza-core -p rhiza-quepaxa --lib --locked
