name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  sql-checks:
    name: Cargo SQL profile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Check, lint, and test SQL profile
        run: |
          cargo check --locked -p rhiza-cli --all-targets --features recorder-postcard-rpc
          dependency_tree="$RUNNER_TEMP/rhiza-sql-dependencies.txt"
          cargo tree --locked -p rhiza-cli -e normal --prefix none --format '{p}' > "$dependency_tree"
          for dependency in rhiza-graph lbug rhiza-kv redb; do
            if awk -v package="$dependency" '$1 == package { found=1 } END { exit !found }' "$dependency_tree"; then
              echo "SQL profile unexpectedly includes $dependency" >&2
              exit 1
            fi
          done
          cargo clippy --locked -p rhiza-cli --all-targets --features recorder-postcard-rpc -- -D warnings
          cargo test --locked -p rhiza-cli --all-targets --features recorder-postcard-rpc

  container-images:
    name: Container image (rhiza-sql)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build rhiza-sql
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: rhiza-sql:ci
          build-args: RHIZA_PROFILE=sql
          cache-from: |
            type=gha,scope=rhiza-sql
          cache-to: type=gha,mode=max,scope=rhiza-sql
      - name: Verify image profile and entrypoint
        env:
          RHIZA_IMAGE: rhiza-sql:ci
          RHIZA_PROFILE: sql
        run: |
          test "$(docker image inspect "$RHIZA_IMAGE" --format '{{ index .Config.Labels "io.rhiza.build-profile" }}')" = "$RHIZA_PROFILE"
          test "$(docker image inspect "$RHIZA_IMAGE" --format '{{ json .Config.Entrypoint }}')" = '["rhiza"]'

  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - run: cargo fmt --all -- --check
      - run: cargo build --release --locked -p rhiza-cli --bin rhiza --features recorder-postcard-rpc
      - run: |
          cargo clippy --locked --all-targets \
            -p rhiza-core -p rhiza-log -p rhiza-obj-store -p rhiza-quepaxa \
            -p rhiza-archive -p rhiza-sql -p rhiza-node -p rhizadb \
            -p rhiza-client -p rhiza-cli -- -D warnings
      - run: |
          cargo test --locked --all-targets \
            -p rhiza-core -p rhiza-log -p rhiza-obj-store -p rhiza-quepaxa \
            -p rhiza-archive -p rhiza-sql -p rhiza-node -p rhizadb \
            -p rhiza-client -p rhiza-cli
      - run: cargo fmt --manifest-path bench/Cargo.toml -- --check
      - run: cargo clippy --manifest-path bench/Cargo.toml --locked --all-targets -- -D warnings
      - run: cargo test --manifest-path bench/Cargo.toml --locked --all-targets
      - run: bash -n scripts/bench-vind.sh scripts/check-workspace-packages.sh scripts/check-quepaxa-package.sh
      - name: Install pinned yq
        env:
          YQ_VERSION: v4.47.2
          YQ_SHA256: 1bb99e1019e23de33c7e6afc23e93dad72aad6cf2cb03c797f068ea79814ddb0
        run: |
          curl -fsSL "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64" -o "${RUNNER_TEMP}/yq"
          echo "${YQ_SHA256}  ${RUNNER_TEMP}/yq" | sha256sum -c -
          sudo install -m 0755 "${RUNNER_TEMP}/yq" /usr/local/bin/yq
      - run: scripts/check-bench-vind-static.sh
      - run: scripts/check-deploy.sh
      - run: scripts/check-workspace-packages.sh
      - run: scripts/check-quepaxa-package.sh

  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.89
      - run: cargo check -p rhiza-core -p rhiza-quepaxa --lib --locked
